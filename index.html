<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>COMET OS</title>

<style>
/* =========================
   COMET OS CORE CONTAINMENT SYSTEM
   FULLY INTEGRATED BUILD
========================= */

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  font-family: system-ui, -apple-system, Arial;
  background: #f4f4f6;
  color: #111;
}

/* MASTER FRAME */
.frame {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* HEADER */
.header {
  font-size: 18px;
  font-weight: 650;
}

/* SUBTEXT */
.subtext {
  font-size: 13px;
  color: #555;
  line-height: 1.4;
}

/* BLOCKS */
.block {
  font-size: 14px;
  line-height: 1.5;
}

/* INPUT CONTROL */
textarea {
  width: 100%;
  min-height: 140px;
  font-size: 15px;
  padding: 12px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 8px;

  overflow-wrap: break-word;
  word-break: break-word;
  white-space: pre-wrap;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  border-radius: 10px;
  border: none;
}

.primary {
  background: #111;
  color: #fff;
}

.secondary {
  background: #ddd;
  color: #111;
}

/* STATUS */
.status {
  font-size: 12px;
  color: #666;
}

/* PREVIEW */
pre {
  white-space: pre-wrap;
  word-break: break-word;
  background: #fff;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 12px;
}

/* FORCE NO HORIZONTAL OVERFLOW ANYWHERE */
* {
  max-width: 100%;
  box-sizing: border-box;
}
</style>
</head>

<body>

<div class="frame">

  <div class="header">COMET OS — Transaction Environment</div>

  <div class="subtext">
    Structured transaction capture, verification, continuity tracking, and immutable record generation.
  </div>

  <div id="app"></div>

  <div id="status" class="status">System initialized.</div>

</div>

<script>
/* =========================
   COMET OS FULL STATE ENGINE
========================= */

let state = "INPUT";

let transaction = {
  payload: "",
  reference: "",
  type: "UNDEFINED",
  timestamp: null
};

const app = document.getElementById("app");
const status = document.getElementById("status");

/* RENDER ENGINE */
function render() {

  if (state === "INPUT") {
    app.innerHTML = `
      <div class="block">Enter Transaction Payload</div>

      <textarea id="payload"
        placeholder="Paste structured transaction (tenancy, buy/sell, agreement, etc.)"></textarea>

      <button class="primary" onclick="next()">CONTINUE</button>
    `;

    status.innerText = "Awaiting structured input.";
  }

  else if (state === "VALIDATION") {
    app.innerHTML = `
      <div class="block">Validating Transaction Structure...</div>
      <div class="block">Checking integrity, completeness, and format consistency.</div>

      <button class="primary" onclick="next()">CONTINUE</button>
      <button class="secondary" onclick="back()">BACK</button>
    `;

    status.innerText = "Validation in progress.";
  }

  else if (state === "REVIEW") {
    app.innerHTML = `
      <div class="block">Review Transaction</div>

      <pre>${transaction.payload}</pre>

      <button class="primary" onclick="next()">PROCESS</button>
      <button class="secondary" onclick="back()">BACK</button>
    `;

    status.innerText = "User confirmation required.";
  }

  else if (state === "PROCESSING") {
    app.innerHTML = `
      <div class="block">Processing Transaction...</div>
      <div class="block">Generating immutable reference and locking record.</div>

      <button class="primary" onclick="next()">LOCK RECORD</button>
    `;

    status.innerText = "System processing.";
  }

  else if (state === "LOCKED") {
    app.innerHTML = `
      <div class="block">Transaction Locked</div>

      <div class="block">
        Reference: <b>${transaction.reference}</b>
      </div>

      <button class="primary" onclick="next()">GENERATE PDF</button>
    `;

    status.innerText = "Record is now immutable.";
  }

  else if (state === "PDF") {
    app.innerHTML = `
      <div class="block">Portable Transaction Record Ready</div>

      <button class="primary" onclick="generatePDF()">DOWNLOAD RECORD</button>
    `;

    status.innerText = "Export available.";
  }
}

/* STATE FLOW */
function next() {

  if (state === "INPUT") {
    transaction.payload = document.getElementById("payload").value || "";
    transaction.timestamp = Date.now();
    state = "VALIDATION";
  }

  else if (state === "VALIDATION") {
    transaction.reference = "COMET-" + Date.now();
    transaction.type = detectType(transaction.payload);
    state = "REVIEW";
  }

  else if (state === "REVIEW") {
    state = "PROCESSING";
  }

  else if (state === "PROCESSING") {
    state = "LOCKED";
  }

  else if (state === "LOCKED") {
    state = "PDF";
  }

  render();
}

function back() {
  if (state === "REVIEW") state = "VALIDATION";
  else if (state === "PROCESSING") state = "REVIEW";
  else if (state === "LOCKED") state = "PROCESSING";
  render();
}

/* SIMPLE TYPE DETECTION (TENANCY / GENERIC) */
function detectType(text) {
  const t = text.toLowerCase();
  if (t.includes("rent") || t.includes("tenant")) return "TENANCY";
  if (t.includes("sell") || t.includes("buy")) return "SALE";
  return "GENERIC";
}

/* PDF EXPORT (IMMUTABLE RECORD) */
function generatePDF() {

  const content = `
COMET OS TRANSACTION RECORD

REFERENCE: ${transaction.reference}
TYPE: ${transaction.type}
TIMESTAMP: ${new Date(transaction.timestamp).toISOString()}

----------------------------------------
PAYLOAD
----------------------------------------
${transaction.payload}

----------------------------------------
STATUS: LOCKED (IMMUTABLE RECORD)
`;

  const blob = new Blob([content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = transaction.reference + ".txt";
  a.click();

  URL.revokeObjectURL(url);
}

/* INIT */
render();

</script>

</body>
</html>
