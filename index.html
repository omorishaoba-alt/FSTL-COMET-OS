<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FSTL COMET OS v8</title>

<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

/* =========================
   BASE SYSTEM
========================= */

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#fff;
}

/* =========================
   HEADER
========================= */

header{
  padding:16px;
  background:#111;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  border-bottom:1px solid #222;
}

/* =========================
   SYSTEM BAR
========================= */

.systembar{
  text-align:center;
  padding:10px;
  font-size:12px;
  opacity:0.75;
  border-bottom:1px solid #1f1f1f;
}

/* =========================
   VIEW
========================= */

#view{
  padding:12px;
  min-height:80vh;
}

/* =========================
   DASHBOARD GRID
========================= */

#dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.card{
  background:#1a1a1a;
  padding:16px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:bold;
  border:1px solid #2a2a2a;
}

/* =========================
   CASE BLOCK
========================= */

.case{
  background:#1a1a1a;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #2a2a2a;
}

/* =========================
   INPUT
========================= */

textarea{
  width:100%;
  min-height:140px;
  padding:12px;
  border-radius:10px;
  background:#222;
  color:#fff;
  border:none;
  font-size:15px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#333;
  color:#fff;
  font-weight:bold;
}

/* =========================
   BOOT SCREEN
========================= */

.boot{
  text-align:center;
  padding:40px 20px;
}

.boot-title{
  font-size:34px;
  font-weight:bold;
  margin-bottom:10px;
}

.bar{
  width:100%;
  height:6px;
  background:#222;
  margin-top:20px;
  overflow:hidden;
  border-radius:10px;
}

.bar div{
  height:100%;
  width:0%;
  background:#4caf50;
  transition:1s;
}

</style>

</head>

<body>

<header>FSTL COMET OS v8</header>

<div class="systembar">
OFFLINE FIELD INTELLIGENCE SYSTEM • PWA CORE ACTIVE • NO SERVER DEPENDENCY
</div>

<div id="view"></div>

<script>

/* =========================
   PWA REGISTRATION
========================= */

if("serviceWorker" in navigator){

  window.addEventListener("load",()=>{

    navigator.serviceWorker.register("./service-worker.js");

  });

}

/* =========================
   STATE ENGINE
========================= */

let cases = JSON.parse(localStorage.getItem("cases") || "[]");

/* =========================
   RISK ENGINE
========================= */

function risk(text){

  let score = 0;
  text = text.toLowerCase();

  if(!text.includes("name")) score += 30;
  if(!text.includes("address")) score += 25;
  if(text.includes("unclear")) score += 25;
  if(text.includes("dispute")) score += 20;
  if(text.length < 30) score += 15;

  if(score > 70) return "HIGH";
  if(score > 40) return "MEDIUM";
  return "LOW";

}

/* =========================
   BOOT SEQUENCE
========================= */

function boot(){

  document.getElementById("view").innerHTML = `
    <div class="boot">
      <div class="boot-title">COMET OS</div>
      <div>Initializing offline kernel...</div>

      <div class="bar">
        <div id="b"></div>
      </div>
    </div>
  `;

  setTimeout(()=>document.getElementById("b").style.width="100%",800);
  setTimeout(showDashboard,2000);

}

/* =========================
   DASHBOARD
========================= */

function showDashboard(){

  document.getElementById("view").innerHTML = `
    <div class="case" style="text-align:center;">
      <b>COMET OS ACTIVE</b><br>
      Offline intelligence runtime ready
    </div>

    <div id="dashboard">

      <div class="card" onclick="newCase()">NEW CASE</div>
      <div class="card" onclick="showCases()">CASES</div>
      <div class="card" onclick="showHigh()">HIGH RISK</div>
      <div class="card" onclick="showReport()">REPORT</div>

    </div>
  `;

}

/* =========================
   NEW CASE
========================= */

function newCase(){

  document.getElementById("view").innerHTML = `
    <h3>NEW CASE</h3>

    <div class="case">
      Example: Land dispute, missing documents, unclear ownership.
    </div>

    <textarea id="input"></textarea>

    <button onclick="saveCase()">PROCESS</button>
  `;

}

/* =========================
   SAVE CASE
========================= */

function saveCase(){

  let input = document.getElementById("input").value;

  if(!input) return;

  let c = {
    id: crypto.randomUUID(),
    input,
    risk: risk(input),
    time: new Date().toISOString()
  };

  cases.push(c);
  localStorage.setItem("cases", JSON.stringify(cases));

  showDashboard();

}

/* =========================
   CASE LIST
========================= */

function showCases(){

  document.getElementById("view").innerHTML =
    cases.map(c => `
      <div class="case">
        ${c.input}<br><br>
        <b>${c.risk}</b>
      </div>
    `).join("");

}

/* =========================
   HIGH RISK
========================= */

function showHigh(){

  document.getElementById("view").innerHTML =
    cases.filter(c=>c.risk==="HIGH")
    .map(c=>`
      <div class="case">${c.input}</div>
    `).join("");

}

/* =========================
   REPORT
========================= */

function showReport(){

  let h = cases.filter(c=>c.risk==="HIGH").length;
  let m = cases.filter(c=>c.risk==="MEDIUM").length;
  let l = cases.filter(c=>c.risk==="LOW").length;

  document.getElementById("view").innerHTML = `
    <div class="case">
      TOTAL: ${cases.length}<br>
      HIGH: ${h}<br>
      MEDIUM: ${m}<br>
      LOW: ${l}
    </div>
  `;

}

/* =========================
   INIT
========================= */

boot();

</script>

</body>
</html>
